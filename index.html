  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz8_T-ZTT2Fq0_9Rqy3rZif8ILGGsoxAcphtoWNyQj1JWBoUxWXFRYGkn68JFtIfRwhOQ/exec";

    let currentUser = null;
    let allRecords = [];
    let cameraStream = null;

    // รายชื่อชั้นเรียนและวิชา (จะเรียกจากชีต หรือใช้ค่าเริ่มต้นนี้เมื่อเชื่อมต่อชีตล้มเหลว)
    let classOptions = ["ปวช.1/1", "ปวช.1/4", "ปวช.2/1", "ปวส.1/1", "ปวส.2/1"];
    let subjectOptions = ["วิชา เทคโนโลยีใบหน้าเพื่อการเช็คชื่อ", "วิชา การพัฒนาเว็บแอปพลิเคชัน", "วิชา คอมพิวเตอร์กราฟิก", "วิชา ภาษาอังกฤษเพื่อการสื่อสาร"];

    function showPage(id) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    // จัดการแท็บหน้าแดชบอร์ดอาจารย์
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => { 
          b.classList.remove('active', 'border-sky-400', 'text-sky-400'); 
          b.classList.add('border-transparent', 'text-slate-400'); 
        });
        btn.classList.add('active', 'border-sky-400', 'text-sky-400');
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.getElementById('tab-' + btn.dataset.tab).classList.remove('hidden');
      });
    });

    // ฟังก์ชันสร้างเมนู Dropdown ในหน้าสแกนหน้า
    function setupScanDropdowns(selectedClass) {
      const classSelect = document.getElementById('scan-select-class');
      const subjectSelect = document.getElementById('scan-select-subject');

      // ตรวจสอบข้อมูลชั้นเรียน
      classSelect.innerHTML = '<option value="">-- เลือกชั้นเรียนของคุณ --</option>';
      classOptions.forEach(cls => {
        const isSelected = cls === selectedClass ? 'selected' : '';
        classSelect.innerHTML += `<option value="${cls}" ${isSelected}>${cls}</option>`;
      });

      // ตรวจสอบข้อมูลวิชาเรียน
      subjectSelect.innerHTML = '<option value="">-- เลือกวิชาที่กำลังเข้าเรียน --</option>';
      subjectOptions.forEach(sub => {
        subjectSelect.innerHTML += `<option value="${sub}">${sub}</option>`;
      });
    }

    // --- ระบบล็อกอินฟอร์มเดี่ยว ---
    document.getElementById('btn-global-login').addEventListener('click', () => {
      const user = document.getElementById('global-user').value.trim();
      const pass = document.getElementById('global-pass').value.trim();

      if (!user || !pass) { 
        Swal.fire('ข้อมูลไม่ครบ', 'กรุณากรอกทั้งชื่อผู้ใช้งานและรหัสผ่าน', 'warning'); 
        return; 
      }
      if (user.length > 60) {
        Swal.fire('ข้อมูลยาวเกินไป', 'ชื่อผู้ใช้งานต้องไม่เกิน 60 ตัวอักษร', 'warning');
        return;
      }
      if (pass.length !== 9 || isNaN(pass)) { 
        Swal.fire('รหัสผ่านไม่ถูกต้อง', 'Password ต้องเป็นตัวเลขความยาว 9 หลักเท่านั้น', 'warning'); 
        return; 
      }

      Swal.fire({
        title: 'กำลังตรวจสอบสิทธิ์',
        text: 'กรุณารอสักครู่ ระบบกำลังเชื่อมต่อฐานข้อมูล...',
        allowOutsideClick: false,
        didOpen: () => { Swal.showLoading(); }
      });

      const script = document.createElement('script');
      script.src = `${SCRIPT_URL}?action=login&username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}&callback=globalLoginResponse`;
      document.body.appendChild(script);
      document.body.removeChild(script);
    });

    // ฟังก์ชันรับคำตอบและแก้บั๊กชื่อไม่ขึ้น
    window.globalLoginResponse = function(response) {
      Swal.close();
      if (response.status === 'success') {
        currentUser = response;
        
        // แก้บั๊กตรงนี้: พยายามหาชื่อจากทุกฟิลด์ที่เป็นไปได้ (name, username, user)
        const displayName = response.name || response.username || document.getElementById('global-user').value;
        const role = (response.role || '').trim().toUpperCase();

        if (role === 'TEACHER') {
          Swal.fire({ icon: 'success', title: 'ยืนยันตัวตนสำเร็จ', text: `สวัสดีอาจารย์ ${displayName}`, timer: 1500, showConfirmButton: false });
          showPage('page-dashboard');
          loadDataFromSheets();
        } else {
          const studentClass = response.class_name || response.class || "";
          const studentId = response.student_id || response.id || document.getElementById('global-pass').value;
          
          // แสดงชื่อผู้ใช้บนกล่องข้อความอย่างถูกต้อง
          document.getElementById('scan-user-info').textContent = `👤 ผู้ใช้งาน: ${displayName} (รหัส: ${studentId})`;
          
          // โหลดค่า Dropdown รอให้เลือก
          setupScanDropdowns(studentClass);

          Swal.fire({ icon: 'success', title: 'เข้าสู่ระบบสำเร็จ', text: `ยินดีต้อนรับคุณ ${displayName}`, timer: 1200, showConfirmButton: false });
          showPage('page-scan');
        }
      } else {
        Swal.fire('เข้าสู่ระบบไม่สำเร็จ', response.message || 'ไม่พบข้อมูลผู้ใช้งาน หรือรหัสผ่านไม่ถูกต้อง', 'error');
      }
    };

    function loadDataFromSheets() {
      const script = document.createElement('script');
      script.src = `${SCRIPT_URL}?action=getStudents&callback=syncStudentsData`;
      document.body.appendChild(script);
      document.body.removeChild(script);
    }

    window.syncStudentsData = function(response) {
      if (response.status === 'success') {
        allRecords = response.data.map(s => ({ type: 'student', student_id: s.id, name: s.name, class_name: s.class }));
        updateDashboard();
        updateStudentList();
      }
    };

    document.getElementById('btn-back-login').addEventListener('click', () => { 
      stopCamera(); 
      document.getElementById('global-user').value = '';
      document.getElementById('global-pass').value = '';
      showPage('page-login'); 
    });
    
    document.getElementById('btn-logout').addEventListener('click', () => { 
      document.getElementById('global-user').value = '';
      document.getElementById('global-pass').value = '';
      showPage('page-login'); 
    });

    // ระบบควบคุมกล้องและการบังคับเลือก ชั้นเรียน/วิชาเรียน
    document.getElementById('btn-start-scan').addEventListener('click', async () => {
      const selectedClass = document.getElementById('scan-select-class').value;
      const selectedSubject = document.getElementById('scan-select-subject').value;

      // บังคับเลือกข้อมูลก่อนสแกน
      if (!selectedClass || !selectedSubject) {
        Swal.fire('กรุณาเลือกข้อมูล', 'โปรดระบุชั้นเรียนและวิชาเรียนของคุณก่อนเริ่มสแกนหน้า', 'warning');
        return;
      }

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
        cameraStream = stream;
        document.getElementById('camera-feed').srcObject = stream;
        document.getElementById('scan-status').classList.remove('hidden');
        setTimeout(() => completeAttendance(selectedClass, selectedSubject), 3000);
      } catch (e) {
        document.getElementById('scan-status').classList.remove('hidden');
        document.getElementById('scan-status').textContent = 'จำลองการสแกนใบหน้า...';
        setTimeout(() => completeAttendance(selectedClass, selectedSubject), 2000);
      }
    });

    function stopCamera() {
      if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
      document.getElementById('camera-feed').srcObject = null;
    }

    function completeAttendance(cls, subject) {
      if (!currentUser) return;
      const now = new Date();
      const isLate = now.getHours() >= 8 && now.getMinutes() > 30;
      
      document.getElementById('scan-status').classList.add('hidden');
      
      // แสดงข้อความความสำเร็จพร้อมวิชาและชั้นเรียนที่เลือก
      Swal.fire({
        icon: 'success',
        title: 'เช็คชื่อสำเร็จ',
        html: `ชั้นเรียน: <b>${cls}</b><br>วิชา: <b>${subject}</b><br>สถานะ: ${isLate ? '<span class="text-amber-500">มาสาย</span>' : '<span class="text-green-500">มาเรียน</span>'}`
      });

      showScanResult(`✅ เช็คชื่อเข้าเรียนชั้น ${cls} วิชา ${subject} สำเร็จ! เวลา ${now.toTimeString().slice(0, 5)}`, true);
      stopCamera();
    }

    function showScanResult(msg, success) {
      const el = document.getElementById('scan-result');
      el.classList.remove('hidden');
      el.textContent = msg;
      el.className = `mt-4 rounded-xl p-4 text-sm font-medium ${success ? 'bg-sky-500/10 border border-sky-400/30 text-sky-600' : 'bg-rose-500/10 border border-rose-500/30 text-rose-600'}`;
    }

    function updateDashboard() {
      const students = allRecords.filter(r => r.type === 'student');
      document.getElementById('stat-total').textContent = students.length;
    }

    function updateStudentList() {
      const students = allRecords.filter(r => r.type === 'student');
      const container = document.getElementById('student-list');
      if (students.length === 0) { container.innerHTML = '<p class="text-slate-500 text-center py-4">ยังไม่มีข้อมูลนักเรียน</p>'; return; }
      container.innerHTML = students.map(s => `
        <div class="flex items-center justify-between bg-slate-700/30 rounded-lg px-3 py-2">
          <div><span class="text-sky-400 font-medium">${s.student_id}</span> <span class="text-white">${s.name}</span></div>
          <span class="text-xs text-slate-400 bg-slate-700 px-2 py-1 rounded">${s.class_name}</span>
        </div>
      `).join('');
    }

    lucide.createIcons();
  </script>
 </body>
</html>
