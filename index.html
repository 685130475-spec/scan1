<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเช็คชื่อด้วยเทคโนโลยีใบหน้า - วิทยาลัยเทคโนโลยีอุตรดิตถ์</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: 'Noto Sans Thai', sans-serif;
            background-color: #e0f2fe; /* สีฟ้าพาสเทล */
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between bg-gradient-to-tr from-blue-100 to-sky-50">

    <div id="login-page" class="flex-grow flex items-center justify-center p-4">
        <div class="bg-white/80 backdrop-blur-md p-8 rounded-2xl shadow-xl w-full max-w-md border border-white text-center">
            <header class="mb-8">
                <h1 class="text-2xl md:text-3xl font-bold text-blue-900 mb-1">ระบบเช็คชื่อด้วยเทคโนโลยีใบหน้า</h1>
                <h2 class="text-sm md:text-base text-blue-600 font-medium">วิทยาลัยเทคโนโลยีอุตรดิตถ์</h2>
            </header>

            <form id="login-form" onsubmit="handleLogin(event)" class="space-y-5 text-left">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Username (รหัส 9 หลัก)</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                            <i class="fas fa-user"></i>
                        </span>
                        <input type="text" id="username" maxlength="9" pattern="\d{9}" inputmode="numeric" required
                            class="w-full pl-10 pr-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400 text-gray-800" 
                            placeholder="กรอกรหัส 9 หลัก">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password (วัน/เดือน/ปีเกิด 6 หลัก)</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input type="password" id="password" maxlength="6" pattern="\d{6}" inputmode="numeric" required
                            class="w-full pl-10 pr-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400 text-gray-800" 
                            placeholder="เช่น 100169">
                    </div>
                </div>

                <button type="submit" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-xl transition duration-200 shadow-md shadow-blue-200 flex items-center justify-center gap-2">
                    <i class="fas fa-sign-in-alt"></i> เข้าสู่ระบบ
                </button>
            </form>
        </div>
    </div>


    <div id="student-page" class="hidden flex-grow flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-lg text-center border border-blue-50">
            <h3 class="text-xl font-bold text-gray-800 mb-2" id="student-welcome">สวัสดี, นักเรียน</h3>
            <p class="text-gray-500 text-sm mb-6">กรุณากดปุ่มด้านล่างเพื่อทำการสแกนใบหน้าเข้าเรียน</p>

            <button id="start-scan-btn" onclick="openCamera()"
                class="mx-auto w-40 h-40 bg-sky-400 hover:bg-sky-500 text-white rounded-full shadow-lg flex flex-col items-center justify-center gap-3 transition-transform transform hover:scale-105">
                <i class="fas fa-camera text-4xl"></i>
                <span class="font-medium text-lg">เช็คชื่อทันที</span>
            </button>

            <div id="camera-container" class="hidden mt-6 space-y-4">
                <div class="relative w-full aspect-video bg-gray-900 rounded-xl overflow-hidden shadow-inner border-2 border-sky-300">
                    <video id="webcam" autoplay playsinline muted class="w-full h-full object-cover"></video>
                    <div class="absolute inset-0 border-4 border-dashed border-white/50 m-8 rounded-full pointer-events-none animate-pulse"></div>
                </div>
                <p class="text-xs text-amber-600"><i class="fas fa-info-circle"></i> กรุณานิ่งๆ ให้กล้องจับใบหน้าของคุณ</p>
                
                <button onclick="processFaceRecognition()"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-xl shadow transition">
                    ยืนยันใบหน้า
                </button>
            </div>

            <button onclick="logout()" class="mt-8 text-sm text-gray-400 hover:text-gray-600 underline">ออกจากระบบ</button>
        </div>
    </div>


    <div id="teacher-page" class="hidden p-4 md:p-8 max-w-7xl mx-auto w-
